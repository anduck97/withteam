<style>

<div id="root"></div>

<script type="text/jsx-source" id="app-src">
const { useState, useEffect, useMemo, useRef } = React;

/* ════════════════════════ Chapter 1 · 데이터 모델 ════════════════════════ */
type JLPTLevel = 'N1' | 'N2' | 'N3' | 'N4' | 'N5' | 'Unknown';

interface Word {
  id: string;
  surface: string;
  dictionaryForm: string;
  reading: string;
  pos: string;
  meaning: string;
  jlptLevel: JLPTLevel;
  conjugation?: string;
}
interface Verse { text: string; translation: string; }
interface SongAnalysis {
  title: string; artist: string; lyrics: string;
  verses: Verse[]; vocabulary: Word[];
}
interface LearningWord { wordId: string; repetition: number; nextReviewDate: Date; lapses?: number; }
interface UserProgress {
  knownWordIds: string[];
  learningWords: LearningWord[];
  recentSongs: Array<{ title: string; artist: string; analyzedAt: string }>;
  history: SongAnalysis[];
}

const EMPTY_PROGRESS: UserProgress = { knownWordIds: [], learningWords: [], recentSongs: [], history: [] };
const LS_PROGRESS = 'kotobatune_progress';
const LS_APIKEY  = 'kotobatune_apikey';

/* ════════════════════════ 저장소 (LocalStorage) ════════════════════════ */
function loadProgress(): UserProgress {
  try {
    const raw = localStorage.getItem(LS_PROGRESS);
    if (!raw) return EMPTY_PROGRESS;
    const p = JSON.parse(raw);
    p.learningWords = (p.learningWords || []).map(lw => ({ ...lw, nextReviewDate: new Date(lw.nextReviewDate), lapses: lw.lapses || 0 }));
    return { ...EMPTY_PROGRESS, ...p };
  } catch { return EMPTY_PROGRESS; }
}
function saveProgress(p: UserProgress) { localStorage.setItem(LS_PROGRESS, JSON.stringify(p)); }

/* ════════════════════════ Chapter 4 · 효과음 (Web Audio) ════════════════════════ */
function playSound(type: 'correct' | 'wrong') {
  try {
    const ctx = new (window.AudioContext || (window as any).webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    if (type === 'correct') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523.25, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.1, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.3);
    } else {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(150, ctx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.15, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.25);
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.25);
    }
  } catch (e) { console.error(e); }
}

/* ════════════════════════ Chapter 3 · 후리가나(Ruby) 엔진 ════════════════════════ */
const HAS_KANJI = /[一-龯]/;

// surface -> reading 사전 만들기 (한자를 포함한 단어만)
function buildRubyDict(vocab: Word[]): Map<string, string> {
  const m = new Map<string, string>();
  (vocab || []).forEach(w => {
    if (w.surface && w.reading && HAS_KANJI.test(w.surface) && !m.has(w.surface)) {
      m.set(w.surface, w.reading);
    }
  });
  return m;
}

// 텍스트를 사전과 매칭해 <ruby> 노드 배열로 렌더 (긴 표기 우선)
function RubyText({ text, dict }: { text: string; dict: Map<string, string> }) {
  if (!text) return null;
  const keys = useMemo(() => Array.from(dict.keys()).sort((a, b) => b.length - a.length), [dict]);
  const nodes: any[] = [];
  let i = 0, key = 0;
  outer: while (i < text.length) {
    for (const k of keys) {
      if (k.length && text.startsWith(k, i)) {
        nodes.push(
          <ruby key={key++}>{k}<rt>{dict.get(k)}</rt></ruby>
        );
        i += k.length;
        continue outer;
      }
    }
    nodes.push(<span key={key++}>{text[i]}</span>);
    i++;
  }
  return <span className="font-jp">{nodes}</span>;
}

/* ════════════════════ 품사별 색상 코딩 + 호버 팝업 (가사 전용) ════════════════════ */
// 활용형이 있으면 무조건 '활용형'(베리) — 한눈에 변형 여부 파악
type PosCat = 'noun' | 'verb' | 'adj' | 'conj' | 'etc';
function posCategory(w: Word): PosCat {
  if ((w.conjugation || '').trim()) return 'conj';
  const pos = w.pos || '';
  if (pos.includes('동사')) return 'verb';
  if (pos.includes('형용사')) return 'adj';
  if (pos.includes('명사')) return 'noun';
  return 'etc';
}
const POS_STYLE: Record<PosCat, { c: string; label: string }> = {
  noun: { c: '#179485', label: '명사' },     // 민트
  verb: { c: '#FB7A26', label: '동사' },     // 오렌지
  adj:  { c: '#E3A008', label: '형용사' },   // 골드
  conj: { c: '#FF5D73', label: '활용형' },   // 베리 (동사·형용사 활용)
  etc:  { c: '#8b93a5', label: '기타' },
};

// 가사 한 줄을 어휘와 매칭해 색 밑줄 + 후리가나 + 호버 팝업으로 렌더 (퀴즈에는 사용 금지 — 정답 노출)
function AnnotatedText({ text, vocabulary, onWordClick }: { text: string; vocabulary: Word[]; onWordClick?: (w: Word) => void }) {
  const bySurface = useMemo(() => {
    const m = new Map<string, Word>();
    (vocabulary || []).forEach(w => { if (w.surface && !m.has(w.surface)) m.set(w.surface, w); });
    return m;
  }, [vocabulary]);
  const keys = useMemo(() => Array.from(bySurface.keys()).sort((a, b) => b.length - a.length), [bySurface]);
  if (!text) return null;

  const nodes: any[] = [];
  let i = 0, key = 0;
  outer: while (i < text.length) {
    for (const k of keys) {
      if (k.length && text.startsWith(k, i)) {
        const w = bySurface.get(k)!;
        const st = POS_STYLE[posCategory(w)];
        nodes.push(
          <span key={key++} className="vtok" style={{ '--tokc': st.c } as any}
            onClick={(e) => { e.stopPropagation(); onWordClick && onWordClick(w); }}>
            {HAS_KANJI.test(k) ? <ruby>{k}<rt>{w.reading}</rt></ruby> : k}
            <span className="vtip">
              <span style={{ display: 'block' }}>
                <span className="text-[10px] font-extrabold text-white px-1.5 py-0.5 rounded" style={{ background: st.c }}>{st.label === '활용형' ? w.pos + '·활용' : w.pos}</span>
                <span className={`text-[10px] font-extrabold px-1.5 py-0.5 rounded ml-1 ${JLPT_COLOR[w.jlptLevel]}`}>{w.jlptLevel}</span>
              </span>
              <span style={{ display: 'block' }} className="font-jp font-bold text-ink text-sm mt-1">{w.surface} <span className="font-normal" style={{ color: st.c }}>{w.reading}</span></span>
              <span style={{ display: 'block' }} className="text-slate-600">{w.meaning}</span>
              {w.dictionaryForm && w.dictionaryForm !== w.surface &&
                <span style={{ display: 'block' }} className="text-slate-400 text-[11px] mt-0.5">사전형 <b className="text-ink font-jp">{w.dictionaryForm}</b></span>}
              {(w.conjugation || '').trim() &&
                <span style={{ display: 'block', color: POS_STYLE.conj.c }} className="text-[11px] font-bold">{w.conjugation}</span>}
            </span>
          </span>
        );
        i += k.length;
        continue outer;
      }
    }
    nodes.push(<span key={key++}>{text[i]}</span>);
    i++;
  }
  return <span className="font-jp">{nodes}</span>;
}

// 색상 범례
function PosLegend() {
  return (
    <div className="flex flex-wrap gap-x-3 gap-y-1 mb-3 text-[11px] font-bold text-slate-600 select-none">
      {(['noun','verb','adj','conj'] as PosCat[]).map(cat => (
        <span key={cat} style={{ borderBottom: `3px solid ${POS_STYLE[cat].c}` }} className="pb-0.5">{POS_STYLE[cat].label}</span>
      ))}
      <span className="text-slate-400 font-normal">· 단어에 커서를 올리면 설명이 떠요</span>
    </div>
  );
}

/* ════════════════════════ 아이콘 (인라인 SVG) ════════════════════════ */
const I = (p) => <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
  stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p} />;
const IconHome    = (p) => <I {...p}><path d="M3 9.5 12 3l9 6.5"/><path d="M5 10v10h14V10"/></I>;
const IconBook    = (p) => <I {...p}><path d="M4 5a2 2 0 0 1 2-2h13v16H6a2 2 0 0 0-2 2z"/><path d="M4 5v14"/></I>;
const IconLibrary = (p) => <I {...p}><path d="M4 4v16"/><path d="M9 4v16"/><path d="m14 5 5 14"/></I>;
const IconBrain   = (p) => <I {...p}><path d="M9 4a3 3 0 0 0-3 3 3 3 0 0 0-1 5 3 3 0 0 0 1 5 3 3 0 0 0 3 3 2.5 2.5 0 0 0 3-2.5V6.5A2.5 2.5 0 0 0 9 4z"/><path d="M15 4a3 3 0 0 1 3 3 3 3 0 0 1 1 5 3 3 0 0 1-1 5 3 3 0 0 1-3 3"/></I>;
const IconCog     = (p) => <I {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-2.9 1.2V21a2 2 0 1 1-4 0v-.1A1.7 1.7 0 0 0 7 19.4l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1A1.7 1.7 0 0 0 4.6 15H4a2 2 0 1 1 0-4h.1A1.7 1.7 0 0 0 6 7l-.1-.1A2 2 0 1 1 8.7 4.1L8.8 4A1.7 1.7 0 0 0 11 4.6V4a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 2.9 1.2l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1A1.7 1.7 0 0 0 21 11h.1a2 2 0 1 1 0 4z"/></I>;
const IconTrash   = (p) => <I {...p}><path d="M3 6h18"/><path d="M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></I>;
const IconCheck   = (p) => <I {...p}><path d="M20 6 9 17l-5-5"/></I>;
const IconX       = (p) => <I {...p}><path d="M18 6 6 18"/><path d="M6 6l12 12"/></I>;
const IconSpark   = (p) => <I {...p}><path d="M12 3v4M12 17v4M3 12h4M17 12h4M5.6 5.6l2.8 2.8M15.6 15.6l2.8 2.8M18.4 5.6l-2.8 2.8M8.4 15.6l-2.8 2.8"/></I>;

const JLPT_COLOR: Record<string,string> = {
  N5:'bg-[#D4F6F0] text-[#179485] border-2 border-ink font-extrabold',
  N4:'bg-[#FFF1C2] text-[#A9790A] border-2 border-ink font-extrabold',
  N3:'bg-[#FFE0C7] text-[#E86410] border-2 border-ink font-extrabold',
  N2:'bg-[#FFD9DF] text-[#E23E55] border-2 border-ink font-extrabold',
  N1:'bg-ink text-white border-2 border-ink font-extrabold',
  Unknown:'bg-white text-slate-600 border-2 border-ink font-extrabold'
};

/* ════════════════════════ Chapter 2 · Claude 가사 분석 호출 ════════════════════════ */
const ANALYSIS_SCHEMA = {
  type: 'object',
  additionalProperties: false,
  properties: {
    verses: {
      type: 'array',
      items: {
        type: 'object', additionalProperties: false,
        properties: { text: { type: 'string' }, translation: { type: 'string' } },
        required: ['text', 'translation']
      }
    },
    vocabulary: {
      type: 'array',
      items: {
        type: 'object', additionalProperties: false,
        properties: {
          surface: { type: 'string' },
          dictionaryForm: { type: 'string' },
          reading: { type: 'string' },
          pos: { type: 'string' },
          meaning: { type: 'string' },
          jlptLevel: { type: 'string', enum: ['N1','N2','N3','N4','N5','Unknown'] },
          conjugation: { type: 'string' }
        },
        required: ['surface','dictionaryForm','reading','pos','meaning','jlptLevel','conjugation']
      }
    }
  },
  required: ['verses', 'vocabulary']
};

const SYSTEM_PROMPT =
`너는 일본어 교육에 특화된 일본어 교사이며 실시간 음악 가사 분석기야.
사용자가 J-Pop 가사를 주면 아래 규칙으로 학습용 분석 데이터를 만든다.

추출 우선순위:
1. 전체 일본어 가사를 자연스러운 단위(주로 한 줄)로 쪼개 verses 로 매핑하고, 각 줄의 한국어 번역(translation)을 단다. 영어뿐인 추임새 줄은 제외한다.
2. 가사에서 쓰인 주요 동사·형용사의 활용형은 가사 속 원문 표기(surface)와 사전형(dictionaryForm)을 이원화해서 추출하고, 활용 정보를 conjugation 에 적는다(예: "과거형(た형)", "て형", "가정형(ば형)"). 활용이 없으면 conjugation 은 "" 로.
3. vocabulary 는 N4~N1 범위의 학습 가치가 높은 단어 위주로 15~30개 구성한다. 君·僕·見る 같은 N5 기초어와 조사는 제외한다.
   - 관용구·연어(예: 気になる, 眼を光らせる)는 통째로 하나의 항목으로 추출해도 좋다.
   - reading 은 단어 표기의 히라가나 요미가나.
   - meaning 은 자연스러운 한국어 뜻. 관용적 쓰임이 있으면 괄호로 짧게 덧붙인다.
   - pos 는 한국어 품사명(명사/동사/い형용사/な형용사/부사/관용표현 등).
   - jlptLevel 은 N5~N1 또는 Unknown.

번역 지침: translation 은 직역이 아니라 노래 가사로서 자연스러운 한국어로 의역한다. 은유·관용 표현은 의미가 통하게 옮기고(예: 手のひらで dancing → 네 손바닥 위에서 춤추고 있어), 화자의 어조(반말)를 유지한다.

반드시 지정된 JSON 스키마 형식 하나로만 응답한다.`;

async function analyzeLyrics(apiKey: string, title: string, artist: string, lyrics: string): Promise<SongAnalysis> {
  const userText =
    `곡 제목: ${title || '(미상)'}\n아티스트: ${artist || '(미상)'}\n\n가사:\n${lyrics}`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'content-type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-opus-4-8',
      max_tokens: 8000,
      system: SYSTEM_PROMPT,
      messages: [{ role: 'user', content: userText }],
      output_config: { format: { type: 'json_schema', schema: ANALYSIS_SCHEMA } }
    })
  });

  if (!res.ok) {
    let detail = '';
    try { detail = (await res.json())?.error?.message || ''; } catch {}
    throw new Error(`Claude API 오류 (${res.status}) ${detail}`);
  }
  const data = await res.json();
  if (data.stop_reason === 'refusal') throw new Error('요청이 안전 정책으로 거부되었습니다.');
  const textBlock = (data.content || []).find(b => b.type === 'text');
  if (!textBlock) throw new Error('응답에서 분석 결과를 찾지 못했습니다.');
  const parsed = JSON.parse(textBlock.text);

  const finalTitle = title.trim() || '(제목 없음)';
  const finalArtist = artist.trim() || '(아티스트 미상)';
  const used = new Set<string>();
  const vocabulary: Word[] = (parsed.vocabulary || []).map((w) => ({
    id: makeWordId(finalTitle, finalArtist, w, used),
    surface: w.surface, dictionaryForm: w.dictionaryForm, reading: w.reading,
    pos: w.pos, meaning: w.meaning, jlptLevel: w.jlptLevel || 'Unknown',
    conjugation: w.conjugation || ''
  }));
  return { title: finalTitle, artist: finalArtist,
           lyrics, verses: parsed.verses || [], vocabulary };
}

/* ════════════════════════ 공통 헬퍼 ════════════════════════ */
function shuffle<T>(arr: T[]): T[] { const a = [...arr]; for (let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

// 일본어 한 줄을 단어스러운 토큰으로 쪼개기 (Chapter 4 유형 C용)
function tokenizeJa(line: string): string[] {
  const re = /[一-龯]+[぀-ゟ]*|[゠-ヿぁ-ゟー]+|[A-Za-z]+|[0-9]+|[^\s]/g;
  return (line.match(re) || []).filter(t => t.trim().length > 0);
}

// 안정적인 단어 ID: 같은 곡을 다시 분석/가져와도 ID가 같아 학습 진도가 보존됨
function makeWordId(title: string, artist: string, w: { surface?: string; dictionaryForm?: string }, used: Set<string>): string {
  const base = `${title}∷${artist}∷${w.dictionaryForm || w.surface}`;
  let id = base, k = 2;
  while (used.has(id)) id = `${base}∷${k++}`;
  used.add(id);
  return id;
}

// 어디에도 존재하지 않는 단어의 학습/앎 기록 정리 (곡 삭제·교체 후 고아 방지)
function pruneOrphans(p: UserProgress): UserProgress {
  const valid = new Set<string>();
  p.history.forEach(s => s.vocabulary.forEach(w => valid.add(w.id)));
  return { ...p,
    learningWords: p.learningWords.filter(l => valid.has(l.wordId)),
    knownWordIds: p.knownWordIds.filter(id => valid.has(id)) };
}

const SAMPLE = {
  title:'夜に駆ける', artist:'YOASOBI',
  lyrics:'沈むように溶けてゆくように\n二人だけの空が広がる夜に\nさよならだけだった\nその一言で全てが分かった'
};

function Analyze({ apiKey, current, setCurrent, progress, setProgress, openSettings, go }) {
  const [title, setTitle] = useState('');
  const [artist, setArtist] = useState('');
  const [lyrics, setLyrics] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [selected, setSelected] = useState<Word | null>(null);
  const [showTrans, setShowTrans] = useState(true);
  const [wf, setWf] = useState<'all'|'learning'|'new'>('all');   // 상태 필터
  const [jf, setJf] = useState<string>('all');                    // JLPT 필터

  const dict = useMemo(() => buildRubyDict(current?.vocabulary || []), [current]);

  async function run() {
    if (!apiKey) { setError('먼저 ⚙ 설정에서 Claude API 키를 입력하세요.'); return; }
    if (!lyrics.trim()) { setError('가사를 입력하세요.'); return; }
    setError(''); setLoading(true); setSelected(null);
    try {
      const result = await analyzeLyrics(apiKey, title, artist, lyrics);
      setCurrent(result);
      setProgress(prev => {
        const history = [result, ...prev.history.filter(s => s.title !== result.title || s.artist !== result.artist)];
        const recent = [{ title: result.title, artist: result.artist, analyzedAt: new Date().toISOString() },
          ...prev.recentSongs.filter(rs => rs.title !== result.title || rs.artist !== result.artist)];
        return { ...prev, history, recentSongs: recent };
      });
    } catch (e:any) { setError(e.message || '분석 실패'); }
    finally { setLoading(false); }
  }

  const isKnown = (id) => progress.knownWordIds.includes(id);
  const isLearning = (id) => progress.learningWords.some(l => l.wordId === id);

  function markKnown(w: Word) {
    setProgress(prev => ({ ...prev,
      knownWordIds: Array.from(new Set([...prev.knownWordIds, w.id])),
      learningWords: prev.learningWords.filter(l => l.wordId !== w.id) }));
  }
  function startLearning(w: Word) {
    setProgress(prev => {
      if (prev.learningWords.some(l => l.wordId === w.id)) return prev;
      return { ...prev,
        knownWordIds: prev.knownWordIds.filter(id => id !== w.id),
        learningWords: [...prev.learningWords, { wordId: w.id, repetition: 0, nextReviewDate: new Date() }] };
    });
  }
  // 카드에서 바로 토글 (분석↔복습 연동)
  function toggleLearning(w: Word) {
    setProgress(prev => {
      const has = prev.learningWords.some(l => l.wordId === w.id);
      return { ...prev,
        knownWordIds: prev.knownWordIds.filter(id => id !== w.id),
        learningWords: has
          ? prev.learningWords.filter(l => l.wordId !== w.id)
          : [...prev.learningWords, { wordId: w.id, repetition: 0, nextReviewDate: new Date() }] };
    });
  }
  function toggleKnown(w: Word) {
    setProgress(prev => {
      const has = prev.knownWordIds.includes(w.id);
      return { ...prev,
        learningWords: prev.learningWords.filter(l => l.wordId !== w.id),
        knownWordIds: has ? prev.knownWordIds.filter(id => id !== w.id)
                          : [...prev.knownWordIds, w.id] };
    });
  }
  // 이 곡의 (아직 분류 안 된) 단어 전체를 학습 등록
  function addAllLearning() {
    if (!current) return;
    setProgress(prev => {
      const known = new Set(prev.knownWordIds);
      const learn = new Set(prev.learningWords.map(l => l.wordId));
      const adds = current.vocabulary
        .filter(w => !known.has(w.id) && !learn.has(w.id))
        .map(w => ({ wordId: w.id, repetition: 0, nextReviewDate: new Date() }));
      return { ...prev, learningWords: [...prev.learningWords, ...adds] };
    });
  }
  const learningInSong = current ? current.vocabulary.filter(w => isLearning(w.id)).length : 0;
  const lwOf = (id: string) => progress.learningWords.find(l => l.wordId === id);
  const dueN = dueCount(progress, Date.now());
  const visibleVocab = current ? current.vocabulary.filter(w => {
    const statusOk = wf === 'all'
      || (wf === 'learning' && isLearning(w.id))
      || (wf === 'new' && !isLearning(w.id) && !isKnown(w.id));
    return statusOk && (jf === 'all' || w.jlptLevel === jf);
  }) : [];

  return (
    <div className="anim-slideup">
      <h1 className="text-2xl font-extrabold text-ink mb-4">🐶 가사 분석기</h1>

      {!current && !apiKey && (
        <div className="bg-white rounded-2xl p-8 shadow-sm border border-slate-100 text-center max-w-2xl">
          <div className="text-5xl mb-3"><span className="wiggle">🐺</span></div>
          <p className="text-slate-600 mb-1 font-medium">열어 볼 곡이 없어요</p>
          <p className="text-sm text-slate-400 mb-5">아카이브에서 곡을 열거나, 곡 데이터(JSON)를 가져와서 학습을 시작하세요.</p>
          <div className="flex gap-2 justify-center">
            <button onClick={()=>go('library')} className="px-5 py-2.5 rounded-xl font-semibold text-white bg-brand-600 hover:bg-brand-700">아카이브 열기</button>
          </div>
          <button onClick={openSettings} className="mt-4 text-xs text-slate-400 underline hover:text-slate-600">API 키로 직접 가사 분석하기</button>
        </div>
      )}

      {!current && apiKey && (
        <div className="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 max-w-2xl">
          <div className="grid grid-cols-2 gap-3">
            <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="곡 제목"
              className="rounded-lg border border-slate-300 px-3 py-2 text-sm font-jp focus:outline-none focus:ring-2 focus:ring-brand-400"/>
            <input value={artist} onChange={e=>setArtist(e.target.value)} placeholder="아티스트"
              className="rounded-lg border border-slate-300 px-3 py-2 text-sm font-jp focus:outline-none focus:ring-2 focus:ring-brand-400"/>
          </div>
          <textarea value={lyrics} onChange={e=>setLyrics(e.target.value)} rows={8} placeholder="여기에 일본어 가사를 붙여넣으세요…"
            className="mt-3 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm font-jp leading-relaxed focus:outline-none focus:ring-2 focus:ring-brand-400"/>
          {error && <div className="mt-3 text-sm text-rose-600">{error}</div>}
          <div className="mt-4 flex items-center gap-3">
            <button onClick={run} disabled={loading}
              className="px-5 py-2.5 rounded-xl font-semibold text-white bg-brand-600 hover:bg-brand-700 disabled:opacity-50 flex items-center gap-2">
              {loading ? '분석 중…' : <><IconSpark width="18" height="18"/> 분석하기</>}
            </button>
            <button onClick={()=>{setTitle(SAMPLE.title);setArtist(SAMPLE.artist);setLyrics(SAMPLE.lyrics);}}
              className="text-sm text-slate-500 hover:text-slate-700">예시 채우기</button>
          </div>
        </div>
      )}

      {current && (
        <div>
          <div className="flex items-center justify-between mb-4">
            <div>
              <div className="text-lg font-bold text-ink font-jp">{current.title}</div>
              <div className="text-sm text-slate-500 font-jp">{current.artist}</div>
            </div>
            <div className="flex gap-2 flex-wrap">
              <button onClick={()=>setShowTrans(s=>!s)} className="px-3 py-1.5 text-sm rounded-lg border border-slate-300 text-slate-600 hover:bg-slate-50">
                번역 {showTrans?'끄기':'켜기'}
              </button>
              <button onClick={()=>go('review')} disabled={progress.learningWords.length===0}
                className="px-3 py-1.5 text-sm rounded-lg font-semibold text-white bg-brand-600 hover:bg-brand-700 disabled:opacity-40">
                복습하기{dueN>0?` (오늘 ${dueN})`:''}
              </button>
              <button onClick={()=>{setCurrent(null);setSelected(null);}} className="px-3 py-1.5 text-sm rounded-lg border border-slate-300 text-slate-600 hover:bg-slate-50">닫기</button>
            </div>
          </div>

          <div className="grid lg:grid-cols-[1fr_340px] gap-4">
            {/* 가사 (품사 색 밑줄 + 후리가나 + 호버 팝업, 단어 클릭 → 상세) */}
            <div className="bg-white rounded-2xl p-5 shadow-sm border border-slate-100">
              <PosLegend />
              {current.verses.map((v, i) => (
                <div key={i} className="py-2 border-b border-slate-50 last:border-0">
                  <div className="text-lg leading-loose"><AnnotatedText text={v.text} vocabulary={current.vocabulary} onWordClick={setSelected} /></div>
                  {showTrans && <div className="text-sm text-slate-500 mt-0.5">{v.translation}</div>}
                </div>
              ))}
            </div>

            {/* 단어 카드 (상시 표시) — 카드에서 바로 학습 등록 */}
            <div className="space-y-2">
              <div className="flex items-center justify-between px-1">
                <div className="text-sm font-semibold text-slate-500">핵심 어휘 {visibleVocab.length}/{current.vocabulary.length}{learningInSong>0?` · 학습 ${learningInSong}`:''}</div>
                <button onClick={addAllLearning} className="text-xs font-semibold text-brand-600 hover:text-brand-700">+ 전체 학습 등록</button>
              </div>
              {/* 필터 칩 */}
              <div className="flex flex-wrap items-center gap-1 px-1">
                {[['all','전체'],['learning','학습중'],['new','미분류']].map(([v,label])=>(
                  <button key={v} onClick={()=>setWf(v)}
                    className={`text-[11px] font-semibold px-2 py-0.5 rounded-full border-2 border-ink ${wf===v?'bg-brand-600 text-white':'bg-white text-slate-600'}`}>{label}</button>
                ))}
                <span className="w-2"></span>
                {['all','N5','N4','N3','N2','N1'].map(v=>(
                  <button key={v} onClick={()=>setJf(v)}
                    className={`text-[11px] font-semibold px-2 py-0.5 rounded-full border-2 border-ink ${jf===v?'bg-mint-600 text-white':'bg-white text-slate-600'}`}>{v==='all'?'JLPT':v}</button>
                ))}
              </div>
              <div className="max-h-[56vh] overflow-auto pr-1 space-y-2">
                {visibleVocab.length===0 && <div className="text-xs text-slate-400 text-center py-6">해당 조건의 단어가 없어요.</div>}
                {visibleVocab.map(w => (
                  <div key={w.id} onClick={()=>setSelected(w)}
                    className={`cursor-pointer bg-white rounded-xl p-3 border transition ${selected?.id===w.id?'border-brand-400 ring-2 ring-brand-100':'border-slate-100 hover:border-slate-300'}`}>
                    <div className="flex items-center justify-between">
                      <div className="font-jp font-semibold text-ink">{w.surface}</div>
                      <span className={`text-[10px] px-1.5 py-0.5 rounded ${JLPT_COLOR[w.jlptLevel]}`}>{w.jlptLevel}</span>
                    </div>
                    <div className="text-xs text-slate-500 font-jp">{w.reading} · {w.meaning}</div>
                    {isLearning(w.id) && (() => {
                      const lw = lwOf(w.id); if (!lw) return null;
                      const due = isDue(lw, Date.now());

// 외부에서 받은(또는 사전 분석한) 곡 데이터를 앱 포맷(SongAnalysis)으로 정규화.
// id·lyrics·결측 필드는 자동 보정 → API 호출 없이 학습/퀴즈에 그대로 사용.
function normalizeSong(raw, seq: number): SongAnalysis | null {
  if (!raw || !Array.isArray(raw.verses) || !Array.isArray(raw.vocabulary)) return null;
  const nTitle = (raw.title || '(제목 없음)').toString().trim();
  const nArtist = (raw.artist || '(아티스트 미상)').toString().trim();
  const used = new Set<string>();
  const vocabulary: Word[] = raw.vocabulary.map((w, i) => ({
    id: w.id || makeWordId(nTitle, nArtist, w, used),
    surface: w.surface || '',
    dictionaryForm: w.dictionaryForm || w.surface || '',
    reading: w.reading || '',
    pos: w.pos || '',
    meaning: w.meaning || '',
    jlptLevel: (w.jlptLevel as JLPTLevel) || 'Unknown',
    conjugation: w.conjugation || ''
  })).filter(w => w.surface);
  const verses: Verse[] = raw.verses
    .map(v => ({ text: v.text || '', translation: v.translation || '' }))
    .filter(v => v.text);
  if (verses.length === 0 || vocabulary.length === 0) return null;
  return {
    title: nTitle, artist: nArtist,
    lyrics: raw.lyrics || verses.map(v => v.text).join('\n'),
    verses, vocabulary
  };
}
// 입력 텍스트(배열 / 단일 곡 / 내보낸 progress) 어느 형태든 곡 배열로 파싱.
function parseImportPayload(text: string): SongAnalysis[] {
  const data = JSON.parse(text);
  let arr;
  if (Array.isArray(data)) arr = data;
  else if (data && Array.isArray(data.history)) arr = data.history;
  else if (data && (data.verses || data.vocabulary)) arr = [data];
  else throw new Error('알 수 없는 형식입니다. 곡 배열 또는 단일 곡 객체여야 합니다.');
  const songs = arr.map((r, i) => normalizeSong(r, i)).filter(Boolean) as SongAnalysis[];
  if (songs.length === 0) throw new Error('유효한 곡이 없습니다. 각 곡에 verses와 vocabulary가 필요합니다.');
  return songs;
}
// history·recentSongs에 병합(중복은 title+artist로 갱신).
function mergeImported(prev: UserProgress, songs: SongAnalysis[]): UserProgress {
  let history = [...prev.history];
  let recent = [...prev.recentSongs];
  songs.forEach(s => {
    history = [s, ...history.filter(h => h.title !== s.title || h.artist !== s.artist)];
    recent = [{ title: s.title, artist: s.artist, analyzedAt: new Date().toISOString() },
      ...recent.filter(r => r.title !== s.title || r.artist !== s.artist)];
  });
  return pruneOrphans({ ...prev, history, recentSongs: recent });
}
function exportSongs(progress: UserProgress) {
  const blob = new Blob([JSON.stringify(progress.history, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'kotobatune-songs.json'; a.click();
  URL.revokeObjectURL(url);
}

/* ════════════════════════ 간격 반복(SRS) 스케줄러 ════════════════════════ */
// repetition(연속 정답 횟수)으로 인덱싱하는 복습 간격(일). 마지막 값에서 캡.
const SRS_INTERVALS = [0, 1, 3, 7, 16, 35, 75];
const MS_DAY = 86400000;
const MAX_SESSION_WORDS = 15;   // 한 세션 최대 단어 수

function srsDays(rep: number): number { return SRS_INTERVALS[Math.min(Math.max(rep,0), SRS_INTERVALS.length - 1)]; }
function isDue(lw: LearningWord, now: number): boolean { return new Date(lw.nextReviewDate).getTime() <= now; }
function dueCount(progress: UserProgress, now: number): number {
  const inVocab = new Set<string>();
  progress.history.forEach(s => s.vocabulary.forEach(w => inVocab.add(w.id)));
  return progress.learningWords.filter(l => inVocab.has(l.wordId) && isDue(l, now)).length;
}
// 정답: 간격 증가 / 오답: 강등 + lapse 기록, 오늘 다시 due
function applyCorrect(lw: LearningWord): LearningWord {
  const rep = lw.repetition + 1;
  return { ...lw, repetition: rep, nextReviewDate: new Date(Date.now() + srsDays(rep) * MS_DAY) };
}
function applyLapse(lw: LearningWord): LearningWord {
  return { ...lw, repetition: Math.max(0, lw.repetition - 1), lapses: (lw.lapses || 0) + 1, nextReviewDate: new Date() };
}
// 숙련도 표시 — 발자국 🐾 (채워진 만큼 숙련)
function MasteryDots({ rep }: { rep: number }) {
  const n = Math.min(Math.max(rep, 0), 5);
  return <span className="select-none">{'🐾'.repeat(n)}<span className="opacity-25">{'🐾'.repeat(5 - n)}</span></span>;
}

/* ════════════════════════ Chapter 4 · 퀴즈 세션 빌더 ════════════════════════ */
type Quiz =
  | { kind:'A'; word:Word; choices:string[]; answer:string }
  | { kind:'B'; word:Word; verse:Verse; choices:string[]; answer:string; blanked:string }
  | { kind:'C'; word:Word; verse:Verse; tokens:string[]; answer:string[] };

// 단어 하나에 대해 숙련도(rep)에 맞는 유형 1개를 생성 (없으면 쉬운 유형으로 폴백)
function pickQuizForWord(w: Word, rep: number, wordSong, meanings: string[], surfaces: string[]): Quiz | null {
  const song = wordSong.get(w.id);
  const verse = song?.verses.find(v => v.text.includes(w.surface));
  const makeA = (): Quiz => {
    const d = shuffle(meanings.filter(m => m !== w.meaning)).slice(0,3);
    return { kind:'A', word:w, answer:w.meaning, choices: shuffle([w.meaning, ...d]) };
  };
  const makeB = (): Quiz | null => {
    if (!verse) return null;
    const d = shuffle(surfaces.filter(s => s !== w.surface)).slice(0,3);
    return { kind:'B', word:w, verse, answer:w.surface, blanked: verse.text.replace(w.surface, '［　　］'), choices: shuffle([w.surface, ...d]) };
  };
  const makeC = (): Quiz | null => {
    if (!verse) return null;
    const tokens = tokenizeJa(verse.text);
    if (tokens.length < 3 || tokens.length > 8) return null;
    return { kind:'C', word:w, verse, answer: tokens, tokens: shuffle(tokens) };
  };
  if (rep >= 4) return makeC() || makeB() || makeA();
  if (rep >= 2) return makeB() || makeA();
  return makeA();
}

// mode 'due': 오늘 복습 예정 단어만 / 'all': 전체 학습 단어. level 로 JLPT 필터. 단어당 1문제, 상한 적용.
function buildSession(progress: UserProgress, mode: 'due'|'all' = 'due', level: 'all'|JLPTLevel = 'all'): { quizzes: Quiz[]; dict: Map<string,string> } {
  const lwById = new Map(progress.learningWords.map(l => [l.wordId, l]));
  const allWords: Word[] = [];
  const wordSong = new Map<string, SongAnalysis>();
  progress.history.forEach(song => song.vocabulary.forEach(w => { allWords.push(w); wordSong.set(w.id, song); }));
  const dict = buildRubyDict(allWords);
  const meanings = allWords.map(w => w.meaning);
  const surfaces = allWords.map(w => w.surface);

  const now = Date.now();
  let entries = allWords
    .filter(w => lwById.has(w.id))
    .map(w => ({ w, lw: lwById.get(w.id)! }));
  if (level !== 'all') entries = entries.filter(e => e.w.jlptLevel === level);
  if (mode === 'due') entries = entries.filter(e => isDue(e.lw, now));
  entries.sort((a,b) => new Date(a.lw.nextReviewDate).getTime() - new Date(b.lw.nextReviewDate).getTime());
  entries = entries.slice(0, MAX_SESSION_WORDS);

  const quizzes: Quiz[] = [];
  for (const e of entries) {
    const q = pickQuizForWord(e.w, e.lw.repetition, wordSong, meanings, surfaces);
    if (q) quizzes.push(q);
  }
  return { quizzes: shuffle(quizzes), dict };
}

  function startSession(mode: 'due'|'all', lv: 'all'|JLPTLevel = level) {
    const built = buildSession(progress, mode, lv);
    setSession(built.quizzes); setDict(built.dict);
    setIdx(0); setDone(0); setWrongCount(0); setCombo(0); setBest(0);
    setFeedback('none'); setPicked(null);
  }
  function changeLevel(lv: 'all'|JLPTLevel) {
    setLevel(lv);
    startSession('due', lv);   // 레벨 변경 시 세션 재구성
  }

  // 세션 생성 — Active Overwrite 락: 진행 중이면 재생성하지 않음. 기본은 '오늘 복습(due)'.

  // 현재 레벨에 해당하는 학습 단어 수 (빈 상태 안내·버튼 활성화용)
  const wordById = useMemo(() => {
    const m = new Map<string, Word>();

    return m;
  }, [progress.history]);
  const levelLearningCount = progress.learningWords.filter(l => {
    const w = wordById.get(l.wordId);
    return w && (level === 'all' || w.jlptLevel === level);
  }).length;

  // 레벨 선택 칩 (모든 화면 상단 공통)
  const levelBar = (
    <div className="flex flex-wrap items-center gap-1.5 mb-4">

        <button key={v} onClick={()=>changeLevel(v)}
          className={`text-xs font-extrabold px-2.5 py-1 rounded-full border-2 border-ink transition ${level===v?'bg-brand-600 text-white':'bg-white text-slate-600 hover:bg-brand-50'}`}>
          {v==='all'?'전체':v}
        </button>
      ))}
    </div>
  );

  const current = session[idx];

  // 유형 C 토큰 초기화
  useEffect(() => {
    if (current?.kind === 'C') { setAssembled([]); setPool(current.tokens); }
  }, [idx, session]);

  function reward(correct: boolean, word?: Word) {
    playSound(correct ? 'correct' : 'wrong');
    if (correct) {
      setFeedback('correct'); setDone(d => d + 1);
      setPraise(PRAISE[Math.floor(Math.random() * PRAISE.length)]);
      setCombo(c => { const n = c + 1; setBest(b => Math.max(b, n)); return n; });
      // SRS: 정답 → 간격 증가 (세션 락 덕분에 배열 보존)
      if (word) setProgress(prev => ({ ...prev,
        learningWords: prev.learningWords.map(l => l.wordId === word.id ? applyCorrect(l) : l) }));
    } else {
      setFeedback('wrong'); setWrongCount(c => c + 1); setCombo(0);
      // 오답 즉시 순환: 현재 문항 복사본을 세션 맨 끝에 이어 붙임
      setSession(prev => [...prev, current]);
      // SRS: 오답 → 강등 + lapse 기록
      if (word) setProgress(prev => ({ ...prev,
        learningWords: prev.learningWords.map(l => l.wordId === word.id ? applyLapse(l) : l) }));
    }
  }

  function next() {
    setFeedback('none'); setPicked(null);
    setIdx(i => i + 1);
  }

  function choose(choice: string) {
    if (feedback !== 'none') return;
    setPicked(choice);
    if (current.kind === 'A') reward(choice === current.answer, current.word);
    else if (current.kind === 'B') reward(choice === current.answer, current.word);
  }

  function tapToken(tok: string, from: 'pool'|'line', i: number) {
    if (feedback !== 'none') return;
    if (from === 'pool') {
      setPool(p => p.filter((_,k)=>k!==i)); setAssembled(a => [...a, tok]);
    } else {
      setAssembled(a => a.filter((_,k)=>k!==i)); setPool(p => [...p, tok]);
    }
  }
  function checkC() {
    if (current.kind !== 'C' || assembled.length === 0) return;
    const ok = JSON.stringify(assembled) === JSON.stringify(current.answer);
    reward(ok, current.word);
  }

  // 키보드 단축키: 1–4 선택지 / Enter = 확인·다음
  useEffect(() => {
    function onKey(e: KeyboardEvent) {
      if (!current) return;
      if (feedback !== 'none') { if (e.key === 'Enter') { e.preventDefault(); next(); } return; }
      if (current.kind === 'A' || current.kind === 'B') {
        const n = parseInt(e.key, 10);
        if (n >= 1 && n <= current.choices.length) { e.preventDefault(); choose(current.choices[n-1]); }
      } else if (current.kind === 'C' && e.key === 'Enter') {
        e.preventDefault(); checkC();
      }
    }
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [current, feedback, assembled, picked]); // eslint-disable-line

  // 빈 상태 — 학습 단어 없음 / 이 레벨에 없음 / 오늘 복습 완료(due 0)
  if (session.length === 0) {
    const hasLearning = progress.learningWords.length > 0;
    return (
      <div className="anim-slideup">
        <h1 className="text-2xl font-extrabold text-ink mb-4">🐺 복습 퀴즈</h1>
        {hasLearning && levelBar}
        <div className="bg-white rounded-2xl p-8 shadow-sm border border-slate-100 text-center">
          {!hasLearning ? (<>
            <div className="text-5xl mb-3"><span className="wiggle">🐰</span></div>
            <p className="text-slate-500 mb-4">아직 학습 중인 단어가 없어요.<br/>Analyze에서 단어를 "학습 시작하기"로 등록하면 퀴즈가 생성됩니다.</p>
            <button onClick={()=>go('analyze')} className="px-5 py-2.5 rounded-xl font-semibold text-white bg-brand-600 hover:bg-brand-700">가사 분석하러 가기</button>
          </>) : levelLearningCount === 0 ? (<>
            <div className="text-5xl mb-3">🍊</div>
            <p className="text-ink font-bold mb-1">{level} 레벨의 학습 단어가 없어요</p>
            <p className="text-sm text-slate-400 mb-4">다른 레벨을 고르거나 '전체'로 복습해 보세요.</p>
            <button onClick={()=>changeLevel('all')} className="px-5 py-2.5 rounded-xl font-semibold text-white bg-brand-600 hover:bg-brand-700">전체로 보기</button>
          </>) : (<>
            <div className="text-5xl mb-3">🐺🎉</div>
            <p className="text-ink font-bold mb-1">오늘 복습 완료!</p>
            <p className="text-sm text-slate-400 mb-4">지금 복습할 단어가 없어요. 각 단어는 예정일에 다시 나와요.</p>
            <button onClick={()=>startSession('all')} className="px-5 py-2.5 rounded-xl font-semibold text-white bg-brand-600 hover:bg-brand-700">그래도 복습 (전체)</button>
          </>)}
        </div>
      </div>
    );
  }

  // 세션 완료 — 요약
  if (idx >= session.length) {
    return (
      <div className="anim-slideup max-w-md mx-auto text-center pt-10">
        <div className="text-6xl mb-2">🐺🎉</div>
        <div className="text-3xl mb-3 select-none">🍊 🍓 🐰 🐶</div>
        <h1 className="text-2xl font-extrabold text-ink mb-2">세션 완료!</h1>
        <p className="text-slate-500 mb-1">정답 {done} · 오답 {wrongCount}회{best >= 2 ? <> · 최고 콤보 <b className="text-brand-600">{best}</b> 🔥</> : null}</p>
        <p className="text-xs text-slate-400 mb-6">다음 복습은 각 단어의 예정일에 다시 준비돼요.</p>
        <div className="flex gap-2 justify-center">
          <button onClick={()=>setSession([])} className="px-5 py-2.5 rounded-xl font-semibold text-white bg-brand-600 hover:bg-brand-700">완료</button>
          <button onClick={()=>startSession('all')} className="px-5 py-2.5 rounded-xl font-semibold border-2 border-ink text-ink bg-white">전체 다시 복습</button>
        </div>
      </div>
    );
  }

  const correctCls = (val:string) =>
    feedback==='none' ? 'border-slate-200 hover:border-brand-300'
    : val===current['answer'] ? 'border-emerald-500 bg-emerald-50'
    : val===picked ? 'border-rose-400 bg-rose-50' : 'border-slate-200 opacity-60';

  const pct = (done / session.length) * 100;
  return (
    <div className="anim-slideup max-w-xl mx-auto">
      {levelBar}
      {/* 진행 바 — 늑대가 진행률을 따라 달림 */}
      <div className="flex items-center gap-3 mb-6">
        <div className="relative flex-1 h-2.5 bg-slate-200 rounded-full">
          <div className="h-full bg-brand-500 rounded-full transition-all" style={{ width: `${pct}%` }} />
          <span className="absolute -top-3.5 text-base transition-all select-none" style={{ left: `calc(${pct}% - 10px)` }}>🐺</span>
        </div>
        <span className="text-xs text-slate-500">{done}/{session.length}</span>
        {combo >= 2 && <span className="text-xs font-extrabold text-brand-600 anim-pop">{combo >= 6 ? '🐺🔥' : combo >= 4 ? '🍓' : '🍊'} x{combo}</span>}
      </div>

      <div className={`bg-white rounded-2xl p-6 shadow-sm border border-slate-100 ${feedback==='wrong'?'anim-shake':''}`}>
        {/* 유형 A */}
        {current.kind === 'A' && (<>
          <div className="text-xs font-semibold text-brand-600 mb-2">🍊 단어의 뜻을 고르세요</div>
          <div className="text-3xl text-center my-6"><RubyText text={current.word.surface} dict={new Map([[current.word.surface, current.word.reading]])} /></div>
          <div className="grid gap-2">
            {current.choices.map((c,i)=>(
              <button key={i} disabled={feedback!=='none'} onClick={()=>choose(c)}
                className={`p-3 rounded-xl border-2 text-left transition flex items-center gap-2 ${correctCls(c)}`}>
                <span className="inline-flex items-center justify-center w-5 h-5 shrink-0 rounded-md border-2 border-ink text-[10px] font-extrabold">{i+1}</span>
                <span>{c}</span>
              </button>
            ))}
          </div>
        </>)}

        {/* 유형 B */}
        {current.kind === 'B' && (<>
          <div className="text-xs font-semibold text-brand-600 mb-2">🍓 빈칸에 알맞은 단어는?</div>
          <div className="text-xl text-center my-4 font-jp leading-relaxed">{current.blanked}</div>
          <div className="text-sm text-slate-400 text-center mb-4">{current.verse.translation}</div>
          <div className="grid grid-cols-2 gap-2">
            {current.choices.map((c,i)=>(
              <button key={i} disabled={feedback!=='none'} onClick={()=>choose(c)}
                className={`p-3 rounded-xl border-2 transition flex items-center justify-center gap-2 ${correctCls(c)}`}>
                <span className="inline-flex items-center justify-center w-5 h-5 shrink-0 rounded-md border-2 border-ink text-[10px] font-extrabold">{i+1}</span>
                <RubyText text={c} dict={dict} />
              </button>
            ))}
          </div>
        </>)}

        {/* 유형 C */}
        {current.kind === 'C' && (<>
          <div className="text-xs font-semibold text-brand-600 mb-2">🐰 번역에 맞게 문장을 완성하세요</div>
          <div className="text-base text-slate-700 text-center my-3">{current.verse.translation}</div>
          {/* 정답 라인 */}
          <div className="min-h-[52px] rounded-xl border-2 border-dashed border-slate-200 p-2 flex flex-wrap gap-2 mb-3">
            {assembled.map((t,i)=>(
              <button key={i} disabled={feedback!=='none'} onClick={()=>tapToken(t,'line',i)}
                className="px-3 py-1.5 rounded-lg bg-brand-50 border border-brand-200 text-ink"><RubyText text={t} dict={dict} /></button>
            ))}
          </div>
          {/* 토큰 풀 */}
          <div className="flex flex-wrap gap-2 justify-center">
            {pool.map((t,i)=>(
              <button key={i} disabled={feedback!=='none'} onClick={()=>tapToken(t,'pool',i)}
                className="px-3 py-1.5 rounded-lg bg-white border border-slate-300 hover:border-brand-300 text-ink"><RubyText text={t} dict={dict} /></button>
            ))}
          </div>
          {feedback==='none' && (
            <button onClick={checkC} disabled={assembled.length===0}
              className="mt-5 w-full py-2.5 rounded-xl font-semibold text-white bg-brand-600 hover:bg-brand-700 disabled:opacity-40">확인</button>
          )}
          {feedback!=='none' && (
            <div className="mt-4 text-center text-sm">
              <span className="text-slate-400">정답: </span>
              <span className="font-jp text-ink"><RubyText text={current.answer.join('')} dict={dict} /></span>
            </div>
          )}
        </>)}

        {/* 피드백 + 다음 */}
        {feedback!=='none' && (
          <div className="mt-5 flex items-center justify-between anim-pop">
            <div className={`flex items-center gap-2 font-bold ${feedback==='correct'?'text-emerald-600':'text-rose-600'}`}>
              {feedback==='correct' ? <><IconCheck width="20" height="20"/> {praise}</> : <><IconX width="20" height="20"/> 다시 나와요 🐾</>}
            </div>
            <button onClick={next} className="px-5 py-2 rounded-xl font-semibold text-white bg-brand-600 hover:bg-brand-700">다음</button>
          </div>
        )}
      </div>
    </div>
  );
}

/* ════════════════════════ 루트 App + 네비게이션 ════════════════════════ */
const TABS = [
  { id:'dashboard', label:'홈',       Icon: IconHome },
  { id:'analyze',   label:'분석',     Icon: IconBook },
  { id:'library',   label:'아카이브', Icon: IconLibrary },
  { id:'review',    label:'복습',     Icon: IconBrain },
];

function App() {
  const [tab, setTab] = useState('dashboard');
  const [progress, setProgress] = useState<UserProgress>(loadProgress);
  const [apiKey, setApiKey] = useState<string>(() => localStorage.getItem(LS_APIKEY) || '');
  const [current, setCurrent] = useState<SongAnalysis | null>(null);
  const [showSettings, setShowSettings] = useState(false);

  useEffect(() => { saveProgress(progress); }, [progress]);

  function saveKey(k: string) { setApiKey(k); localStorage.setItem(LS_APIKEY, k); setShowSettings(false); }
  function openSong(s: SongAnalysis) { setCurrent(s); setTab('analyze'); }

  const Nav = ({ vertical }) => (
    <nav className={vertical ? 'flex flex-col gap-1' : 'flex justify-around'}>
      {TABS.map(t => {
        const active = tab === t.id;
        return (
          <button key={t.id} onClick={()=>setTab(t.id)}
            className={`flex ${vertical?'flex-row gap-3 px-4 py-3 rounded-xl':'flex-col items-center gap-0.5 py-2 flex-1'}
              ${active ? (vertical?'bg-brand-50 text-brand-700':'text-brand-600') : 'text-slate-500 hover:text-slate-800'}`}>
            <t.Icon width="22" height="22"/>
            <span className={vertical?'font-semibold':'text-[11px]'}>{t.label}</span>
          </button>
        );
      })}
    </nav>
  );

  return (
    <div className="h-full flex flex-col md:flex-row">
      {/* 데스크톱 사이드바 */}
      <aside className="hidden md:flex md:w-60 shrink-0 flex-col border-r border-slate-200 bg-white p-4">
        <div className="flex items-center gap-2 px-2 mb-6">
          <div className="w-9 h-9 rounded-xl bg-brand-600 text-white grid place-items-center text-lg">🐺</div>
          <div className="font-extrabold text-ink leading-tight">KotobaTune<div className="text-[10px] font-normal text-slate-400">コトバチューン</div></div>
        </div>
        <Nav vertical />
        <div className="mt-auto">
          <button onClick={()=>setShowSettings(true)} className="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-500 hover:text-slate-800 w-full">
            <IconCog width="22" height="22"/><span className="font-semibold">설정</span>
          </button>
        </div>
      </aside>

      {/* 모바일 상단바 */}
      <header className="md:hidden flex items-center justify-between px-4 h-14 bg-white border-b border-slate-200">
        <div className="flex items-center gap-2">
          <div className="w-7 h-7 rounded-lg bg-brand-600 text-white grid place-items-center text-sm">🐺</div>
          <span className="font-extrabold text-ink">KotobaTune</span>
        </div>
        <button onClick={()=>setShowSettings(true)} className="text-slate-500"><IconCog/></button>
      </header>

      {/* 본문 */}
      <main className="flex-1 overflow-auto p-4 md:p-8 pb-24 md:pb-8">
        <div className="max-w-5xl mx-auto">
          {tab==='dashboard' && <Dashboard progress={progress} go={setTab} />}
          {tab==='analyze'   && <Analyze apiKey={apiKey} current={current} setCurrent={setCurrent}
                                          progress={progress} setProgress={setProgress} openSettings={()=>setShowSettings(true)} go={setTab} />}
          {tab==='library'   && <Library progress={progress} setProgress={setProgress} openSong={openSong} />}
          {tab==='review'    && <Review progress={progress} setProgress={setProgress} go={setTab} />}
        </div>
      </main>

      {/* 모바일 하단 네비게이션 */}
      <div className="md:hidden fixed bottom-0 inset-x-0 bg-white border-t border-slate-200 z-40">
        <Nav vertical={false} />
      </div>

      {showSettings && <SettingsModal apiKey={apiKey} onSave={saveKey} onClose={()=>setShowSettings(false)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<!-- 부트스트랩: classic JSX 런타임으로 직접 트랜스파일 후 실행 (자동 변환의 automatic-runtime import 문제 회피) -->
<script>
(function () {
  function boot() {
    try {
      var src = document.getElementById('app-src').textContent;
      var out = Babel.transform(src, {
        presets: [['react', { runtime: 'classic' }], 'typescript'],
        filename: 'app.tsx'
      }).code;
      var s = document.createElement('script');
      s.textContent = out;
      document.body.appendChild(s);
    } catch (e) {
      document.getElementById('root').innerHTML =
        '<pre style="padding:16px;color:#b91c1c;white-space:pre-wrap;font:13px monospace">'
        + 'KotobaTune 로드 오류:\n' + (e && e.message ? e.message : e) + '</pre>';
      console.error(e);
    }
  }
  if (window.Babel) boot();
  else window.addEventListener('load', boot);
})();
</script>
</body>
